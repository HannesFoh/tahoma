<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tahoma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #0d0d0d;
      background-image: url('band.jpg');
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
    }

    /* Dark overlay so text stays readable */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.35) 40%,
        rgba(0,0,0,0.75) 100%
      );
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 48px 32px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .band-name {
      font-family: 'Dancing Script', cursive;
      font-size: 88px;
      color: #ffffff;
      line-height: 1;
      margin-bottom: 6px;
      text-shadow: 0 2px 24px rgba(0,0,0,0.6);
      letter-spacing: -1px;
    }

    .tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 40px;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      text-decoration: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: transform 0.15s ease, opacity 0.15s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-spotify {
      background: #1DB954;
      color: #000000;
    }

    .btn-apple {
      background: #2a2a2a;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .btn-youtube {
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .btn-tiktok {
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .btn svg {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="band-name">Tahoma</div>
    <div class="tagline">New single — On a Roll</div>
